<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurslarım - EduCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .page-header {
            padding: 4rem 5%;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">EduCore</div>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="index.html#courses">Kurslar</a></li>
                <!-- Dynamic links will be added here -->
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1>Kurslarım</h1>
        <p>Kayıt olduğunuz tüm kurslar</p>
    </div>

    <section class="section">
        <div class="course-grid" id="my-course-list">
            <div class="loading-state">Kurslar yükleniyor...</div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 EduCore. Tüm hakları saklıdır.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Override or extend logic for this specific page
        async function loadMyCourses() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const container = document.getElementById('my-course-list');

            try {
                const res = await fetch(`${API_BASE_URL}/Enrollments/my-courses`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Kurslar alınamadı');

                const courses = await res.json();
                container.innerHTML = '';

                if (courses.length === 0) {
                    container.innerHTML = '<p style="text-align:center; grid-column:1/-1; font-size:1.2rem; color:#cbd5e1">Henüz hiç bir kursa kayıt olmadınız.</p>';
                    return;
                }

                courses.forEach(course => {
                    const card = `
                        <div class="course-card">
                            <img src="${course.imageUrl || 'https://via.placeholder.com/400x200'}" alt="${course.title}" class="course-image">
                            <div class="course-content">
                                <div class="course-category">${course.categoryName}</div>
                                <h3 class="course-title">${course.title}</h3>
                                <div class="course-instructor">
                                    <i class="fas fa-chalkboard-teacher"></i>
                                    <span>${course.instructorName}</span>
                                </div>
                                <div class="course-footer">
                                    <a href="course-details.html?id=${course.id}" class="view-btn">Kursa Git</a>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1">Kurslar yüklenirken bir hata oluştu.</p>';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // app.js will run 'updateNav', then we load courses
            loadMyCourses();
        });
    </script>
</body>

</html>
